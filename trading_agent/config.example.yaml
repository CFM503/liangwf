# ═══════════════════════════════════════════════
# TradingAgent 配置文件
# ═══════════════════════════════════════════════
# 使用方法:
#   1. 复制为 config.yaml
#   2. 填入你的配置
#   3. 运行 python -m trading_agent.main --encrypt 加密敏感字段

# 标的池（A股代码）
stocks:
  - "600519"    # 贵州茅台
  - "300750"    # 宁德时代
  - "601318"    # 中国平安

# 初始资金
initial_cash: 1000000

# 每日运行时间（A股收盘后）
run_time: "15:10"

# 日志目录
log_dir: "logs"

# 数据库路径（模拟盘持仓/订单）
db_path: "trading_agent.db"

# ─────────────────────────────────────────
# 策略参数
# ─────────────────────────────────────────
strategy:
  fast_period: 5       # 短期均线
  slow_period: 20      # 长期均线
  vol_period: 20       # 均量周期
  vol_mult: 1.5        # 成交量倍数阈值
  stop_loss: 0.08      # 止损 8%
  take_profit: 0.15    # 止盈 15%
  trailing_pct: 0.05   # 跟踪止盈回撤 5%

# ─────────────────────────────────────────
# 风控参数
# ─────────────────────────────────────────
risk:
  max_single_pct: 0.20     # 单股最大仓位 20%
  max_total_pct: 0.60      # 总仓位上限 60%
  max_daily_loss_pct: 0.03 # 每日最大亏损 3%
  kill_switch_file: ".kill_switch"

# ─────────────────────────────────────────
# 邮件通知（可选）
# ─────────────────────────────────────────
email:
  enabled: false
  smtp_server: "smtp.qq.com"
  smtp_port: 465
  sender: ""          # 你的邮箱
  password: ""        # 授权码（--encrypt 后变为 ENC:xxx）
  receiver: ""        # 接收通知的邮箱

# ─────────────────────────────────────────
# 券商接口（实盘模式）
# ─────────────────────────────────────────
broker:
  mode: "simulator"    # simulator / live
  api_key: ""          # 券商API Key（--encrypt 后变为 ENC:xxx）
  api_secret: ""       # 券商API Secret
  account_id: ""       # 资金账号
