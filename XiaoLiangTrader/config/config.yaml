# ═══════════════════════════════════════════════════
# XiaoLiangTrader — 个人量化交易配置
# ═══════════════════════════════════════════════════
# 修改后直接生效，不用改代码

# 标的池（A股代码，用于自动交易）
# 扫描选股时默认使用 data.fetcher.DEFAULT_POOL（20只各行业龙头）
stocks:
  - "600519"    # 贵州茅台
  - "300750"    # 宁德时代
  - "601318"    # 中国平安

# 选股扫描参数（python main.py --scan 使用）
screener:
  top_n: 10              # 最终输出前 N 只
  min_tech_score: 40.0   # 技术面最低分（低于此分不入选）
  max_position_pct: 20.0 # 单股最大仓位占比

# 初始资金（元）
initial_cash: 1000000

# 每日运行时间（收盘后）
run_time: "15:10"

# 数据回溯起始日
data_start: "20180101"

# ─────────────────────────────────────────────
# 双均线策略参数
# ─────────────────────────────────────────────
strategy:
  fast_period: 5
  slow_period: 20
  vol_period: 20
  vol_mult: 1.5
  stop_loss: 0.08
  take_profit: 0.15
  trailing_pct: 0.05

# ─────────────────────────────────────────────
# 风控参数
# ─────────────────────────────────────────────
risk:
  max_single_pct: 0.20
  max_total_pct: 0.60
  max_daily_loss_pct: 0.03
  limit_up_threshold: 0.095
  limit_down_threshold: -0.095
  kill_switch_file: ".kill_switch"

# ─────────────────────────────────────────────
# 机器学习增强（可选）
# ─────────────────────────────────────────────
# model_type 可选:
#   lightgbm          — 速度快，推荐（需 pip install lightgbm）
#   xgboost           — 精度高（需 pip install xgboost）
#   random_forest     — 最稳定，不过拟合（sklearn 自带）
#   gradient_boosting — sklearn 自带 GBDT
# ─────────────────────────────────────────────
ml:
  enabled: false
  model_type: "lightgbm"
  lookback_days: 60
  retrain_days: 30
  forward_days: 3
  threshold: 0.02
  confidence_threshold: 0.6
  n_estimators: 200
  max_depth: 5

# ─────────────────────────────────────────────
# 邮件通知
# ─────────────────────────────────────────────
email:
  enabled: false
  smtp_server: "smtp.qq.com"
  smtp_port: 465
  sender: ""
  password: ""
  receiver: ""

# ─────────────────────────────────────────────
# 券商接口
# ─────────────────────────────────────────────
broker:
  mode: "simulator"
  api_key: ""
  api_secret: ""
  account_id: ""
