# ═══════════════════════════════════════════════════
# XiaoLiangTrader — 个人量化交易配置
# ═══════════════════════════════════════════════════
# 修改后直接生效，不用改代码
# 敏感字段用 python main.py --encrypt 自动加密

# 标的池（A股代码，不带交易所前缀）
stocks:
  - "600519"    # 贵州茅台
  - "300750"    # 宁德时代
  - "601318"    # 中国平安

# 初始资金（元）
initial_cash: 1000000

# 每日自动运行时间（收盘后）
run_time: "15:10"

# 数据回溯起始日
data_start: "20180101"

# ─────────────────────────────────────────────
# 双均线策略参数
# ─────────────────────────────────────────────
strategy:
  fast_period: 5       # 短期均线
  slow_period: 20      # 长期均线
  vol_period: 20       # 均量周期
  vol_mult: 1.5        # 成交量放大倍数
  stop_loss: 0.08      # 止损 8%
  take_profit: 0.15    # 止盈 15%
  trailing_pct: 0.05   # 跟踪止盈回撤 5%

# ─────────────────────────────────────────────
# 风控参数
# ─────────────────────────────────────────────
risk:
  max_single_pct: 0.20       # 单股 ≤ 20%
  max_total_pct: 0.60        # 总仓位 ≤ 60%
  max_daily_loss_pct: 0.03   # 每日亏损 ≤ 3%
  limit_up_threshold: 0.095  # 涨停阈值（9.5%以上不追）
  limit_down_threshold: -0.095
  kill_switch_file: ".kill_switch"

# ─────────────────────────────────────────────
# 机器学习增强（可选）
# ─────────────────────────────────────────────
ml:
  enabled: false             # 改为 true 启用 LightGBM
  lookback_days: 60
  retrain_days: 30
  confidence_threshold: 0.6

# ─────────────────────────────────────────────
# 本地大模型辅助（可选）
# ─────────────────────────────────────────────
llm:
  enabled: false             # 改为 true 启用 Ollama 辅助
  api_url: "http://localhost:11434/api/generate"
  model_name: "qwen2.5:1.5b"
  timeout: 30

# ─────────────────────────────────────────────
# 邮件通知
# ─────────────────────────────────────────────
email:
  enabled: false
  smtp_server: "smtp.qq.com"
  smtp_port: 465
  sender: ""
  password: ""
  receiver: ""

# ─────────────────────────────────────────────
# 券商接口
# ─────────────────────────────────────────────
broker:
  mode: "simulator"
  api_key: ""
  api_secret: ""
  account_id: ""
